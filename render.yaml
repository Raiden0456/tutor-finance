services:
  # ── Redis-compatible cache (Render Key Value) ───────────────────────────────
  - type: keyvalue
    name: tutor-finance-cache
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # ── REST API (NestJS) ────────────────────────────────────────────────────────
  - type: web
    name: tutor-finance-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm turbo run build --filter=@tutor-finance/api...
    startCommand: cd apps/api && node dist/scripts/migrate.js && node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tutor-finance-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: TRUSTED_ORIGINS
        sync: false
      - key: AUTH_EMAIL_PROVIDER
        value: resend
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tutor-finance-cache
          property: connectionString
      - key: CACHE_ENABLED
        value: 'true'

  # ── Web (Astro SSR) ──────────────────────────────────────────────────────────
  - type: web
    name: tutor-finance-web
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm turbo run build --filter=@tutor-finance/web...
    startCommand: node apps/web/dist/server/entry.mjs
    envVars:
      - key: NODE_ENV
        value: production
      # Internal API URL used by SSR + the same-origin /api/* reverse proxy.
      # On Render this can be the API service's internal hostname.
      - key: SERVER_API_URL
        sync: false
      # Public URL of the web app itself. Browser requests go to its own
      # origin and are proxied to the API, so PUBLIC_API_URL is not needed.
      - key: PUBLIC_APP_URL
        sync: false
      # Public URL of the marketing landing site. Used by AuthLayout to render
      # the "Uchetka" link back to the landing from /login, /sign-up, etc.
      # If unset, the link is hidden.
      - key: PUBLIC_LANDING_URL
        sync: false

  # ── Landing (static Astro) ───────────────────────────────────────────────────
  - type: web
    name: tutor-finance-landing
    runtime: static
    region: frankfurt
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm turbo run build --filter=@tutor-finance/landing...
    staticPublishPath: ./apps/landing/dist
    envVars:
      # Public URL of the web (app) service. CTAs link to ${PUBLIC_WEB_URL}/sign-up.
      - key: PUBLIC_WEB_URL
        sync: false

databases:
  - name: tutor-finance-db
    region: frankfurt
    plan: free
    databaseName: tutor_finance
    user: tutor
